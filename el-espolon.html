        body {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 60px 20px 40px;
            position: relative;
        }

        /* Header */
        .header-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .header-section h1 {
            font-size: 80px;
            font-weight: normal;
            margin-bottom: 10px;
        }

        .header-section h1 a {
            color: inherit;
            text-decoration: none;
        }

        .header-section h1 a:hover {
            text-decoration: underline;
        }

        .header-section .subtitle {
            font-size: 36px;
            letter-spacing: 4px;
            white-space: nowrap;
        }

        /* Blinking cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 36px;
            background-color: #000;
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Portfolio List */
        .portfolio-section {
            text-align: center;
            margin: 20px 0 60px;
        }

        .portfolio-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .portfolio-item {
            font-size: 22px;
            text-decoration: none;
            color: #000000;
            transition: opacity 0.3s;
        }

        .portfolio-item:hover {
            opacity: 0.5;
        }

        /* Clippy + Speech Bubble */
        .clippy-wrapper {
            position: fixed;
            bottom: 100px;
            right: 5%;
            z-index: 10;
        }

        .clipart {
            display: block;
            width: 87px;
            height: auto;
            user-select: none;
            transition: transform 0.25s ease;
            transform-origin: bottom right;
        }

        .clippy-wrapper:hover .clipart {
            transform: scale(1.12);
        }

        /* Clippy's eyes that track the cursor */
        .clippy-eyes {
            position: absolute;
            top: 0;
            left: 0;
            width: 87px;
            height: 105px;
            pointer-events: none;
            transition: transform 0.25s ease;
            transform-origin: bottom right;
        }

        .clippy-wrapper:hover .clippy-eyes {
            transform: scale(1.12);
            transform-origin: bottom right;
        }

        /* Blink: crossfade to closed-eye image — no src-swap, no flash */
        .clippy-blink-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 87px;
            height: auto;
            display: block;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease-in;
        }
        .clippy-wrapper.is-blinking .clippy-blink-overlay {
            opacity: 1;
        }
        .clippy-wrapper:not(.is-blinking) .clippy-blink-overlay {
            transition: opacity 0.12s ease-out;
        }
        .clippy-wrapper.is-blinking .clippy-pupil {
            opacity: 0;
            transition: opacity 0.08s ease-in;
        }

        .clippy-pupil {
            position: absolute;
            width: 14px !important;
            height: 11px !important;
            background-color: #fdfdfd;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.08s ease-out;
        }

        .clippy-pupil::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 9px !important;
            height: 7px !important;
            background-color: #17171a;
            border-radius: 50%;
            transform: translate(calc(-50% + var(--eye-x, 0px)), calc(-50% + var(--eye-y, 0px)));
            transition: transform 0.06s linear;
        }

        .clippy-pupil-left {
            left: 36%;
            top: 31.1%;
        }

        .clippy-pupil-right {
            left: 55.2%;
            top: 36.9%;
        }


        .speech-bubble {
            position: absolute;
            bottom: 100%;
            right: 10px;
            margin-bottom: 24px;
            width: 230px;
            background-color: #FFFFCC;
            border: 1px solid #333;
            border-radius: 22px;
            padding: 18px 22px;
            text-align: center;
            font-size: 17px;
            line-height: 1.5;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.12);
            opacity: 0;
            visibility: hidden;
            transform: translateY(12px);
            transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
        }

        .clippy-wrapper:hover .speech-bubble {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .speech-bubble p {
            margin: 0 0 10px;
        }

        .speech-bubble p:last-of-type {
            margin-bottom: 14px;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 35px;
            width: 16px;
            height: 16px;
            background-color: #FFFFCC;
            border-right: 1px solid #333;
            border-bottom: 1px solid #333;
            transform: rotate(45deg);
        }

        .bubble-yes {
            display: inline-block;

        // Inject closed-eye overlay — crossfades over open Clippy on blink
        const clippyOverlay = document.createElement('img');
        clippyOverlay.className = 'clippy-blink-overlay';
        clippyOverlay.src = clippyClosedSrc;
        clippyOverlay.setAttribute('aria-hidden', 'true');
        clippyOverlay.alt = '';
        clippyImg.closest('.clippy-wrapper').appendChild(clippyOverlay);

        function blinkClippy() {
            const wrapper = clippyImg.closest('.clippy-wrapper');
            if (wrapper) wrapper.classList.add('is-blinking');
            // 100ms fade-in + 80ms hold = 180ms, then fade-out starts
            setTimeout(() => {
                if (wrapper) wrapper.classList.remove('is-blinking');
            }, 180);
        }

        setInterval(blinkClippy, 3000);

        // Clippy's eyes follow the cursor — uses setInterval so tracking
        // continues even when cursor is over an iframe (Vimeo etc.)
        const clippyEyes = document.getElementById('clippy-eyes');

        if (clippyEyes) {
            let lastMouseX = window.innerWidth / 2;
            let lastMouseY = window.innerHeight / 2;

            function updateEyes() {
                const rect = clippyEyes.getBoundingClientRect();
                if (rect.width === 0) return;
                const originX = rect.left + rect.width * 0.45;
                const originY = rect.top + rect.height * 0.35;
                const dx = lastMouseX - originX;
                const dy = lastMouseY - originY;
                const angle = Math.atan2(dy, dx);
                const maxOffset = 1.65;
                const offsetX = Math.cos(angle) * maxOffset;
                const offsetY = Math.sin(angle) * maxOffset;
                clippyEyes.style.setProperty('--eye-x', `${offsetX}px`);
                clippyEyes.style.setProperty('--eye-y', `${offsetY}px`);
            }

            window.addEventListener('mousemove', (e) => {
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            });

            // Capture mousemove on iframe parent containers
            document.querySelectorAll('iframe').forEach(iframe => {
                // Walk up 3 levels to capture cursor as close to iframe as possible
                let el = iframe.parentElement;
                for (let i = 0; i < 3 && el; i++) {
                    el.addEventListener('mousemove', (e) => {
                        lastMouseX = e.clientX;
                        lastMouseY = e.clientY;
                    });
                    // When cursor enters the iframe area, point eyes at iframe center
                    el.addEventListener('mouseleave', () => {
                        const rect = iframe.getBoundingClientRect();
                        if (rect.width > 0) {
                            lastMouseX = rect.left + rect.width / 2;
                            lastMouseY = rect.top + rect.height / 2;
                        }
                    });
                    el = el.parentElement;
                }
            });

            // Keep updating every 50ms so eyes always track
            setInterval(updateEyes, 50);
        }
